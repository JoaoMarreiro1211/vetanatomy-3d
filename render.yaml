databases:
  - name: vetanatomy-db
    databaseName: vetanatomy
    user: vetanatomy
    plan: free

services:
  - type: web
    name: vetanatomy-api
    runtime: docker
    plan: free
    dockerContext: ./apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vetanatomy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: REFRESH_TOKEN_COOKIE_SECURE
        value: "True"
      - key: REFRESH_TOKEN_COOKIE_SAMESITE
        value: "none"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: LOCAL_STORAGE_PATH
        value: /app/storage
