version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "vetanatomy"
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vetanatomy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../../apps/api
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: "db"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "vetanatomy"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      LOCAL_STORAGE_PATH: "/app/storage"
    ports:
      - "8000:8000"
    volumes:
      - api-storage:/app/storage

  web:
    build: ../../apps/web
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8000/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db-data:
  api-storage:
